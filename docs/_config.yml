title: agex
description: Agent-operated developer-experience CLI — deterministic per-backend markdown briefings for autonomous agents.
url: https://agex.culture.dev
baseurl: ""
lang: en

theme: just-the-docs
color_scheme: dark-terminal

search_enabled: true
search:
  button: true

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: false

markdown: kramdown
permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache
  - .jekyll-metadata
  - _site
